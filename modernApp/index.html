<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitality Character Builder - Modern</title>
    <link rel="stylesheet" href="css/modern-app.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Vitality Character Builder</h1>
            <div id="notification-container"></div>
        </header>
        
        <nav class="tab-navigation">
            <button class="tab-btn active" data-tab="basic-info">Basic Info</button>
            <button class="tab-btn" data-tab="archetypes">Archetypes</button>
            <button class="tab-btn" data-tab="main-pool">Main Pool</button>
        </nav>
        
        <main class="tab-container">
            <div id="tab-content"></div>
        </main>
        
        <aside class="character-summary">
            <h3>Character Summary</h3>
            <div id="summary-content"></div>
        </aside>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
