<!DOCTYPE html>
<html>
<head>
    <title>Test Limits</title>
</head>
<body>
    <script type="module">
        import { gameDataManager } from './rulebook/character-builder/core/GameDataManager.js';
        import { SpecialAttackSystem } from './rulebook/character-builder/systems/SpecialAttackSystem.js';

        async function testLimits() {
            await gameDataManager.init();
            console.log('Testing limits...');
            
            const limits = SpecialAttackSystem.getAvailableLimits();
            console.log('Available limits:', limits);
            
            if (limits.length > 0) {
                const firstLimit = limits[0];
                console.log('First limit:', firstLimit);
                
                const foundLimit = SpecialAttackSystem.getLimitById(firstLimit.id);
                console.log('Found limit by ID:', foundLimit);
            }
        }

        testLimits().catch(console.error);
    </script>
</body>
</html>
